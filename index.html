<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kho-Ipa</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
  </style>
</head>
<body class="bg-white min-h-screen">

  <div class="max-w-xl mx-auto bg-white min-h-screen shadow-xl">
    <!-- Header giống iOS -->
    <div class="bg-white border-b px-6 py-4 sticky top-0 z-50">
      <div class="flex items-center justify-between">
        <h1 class="text-3xl font-semibold text-black">Kho-Ipa</h1>
        <div class="text-sm text-gray-500">v1.0</div>
      </div>
    </div>

    <div class="p-6">
      <p class="text-gray-600 mb-6">Kho lưu trữ IPA mod miễn phí cho iOS (Non-jailbreak)</p>

      <!-- Tìm kiếm -->
      <div class="relative mb-8">
        <input id="search" 
               type="text" 
               placeholder="Tìm ứng dụng..." 
               class="w-full bg-gray-100 border border-gray-300 rounded-3xl py-4 pl-12 text-base focus:outline-none focus:border-blue-500">
        <i class="fa-solid fa-magnifying-glass absolute left-5 top-1/2 -translate-y-1/2 text-gray-400"></i>
      </div>

      <!-- Danh sách app mẫu -->
      <div id="appList" class="space-y-4">
        <!-- JS sẽ render ở đây -->
      </div>
    </div>
  </div>

  <script>
    const apps = [
      { name: "YouTube Premium", icon: "▶️", desc: "YouTube không quảng cáo + background" },
      { name: "Spotify Premium", icon: "🎵", desc: "Nghe nhạc không giới hạn" },
      { name: "uYou Plus", icon: "📺", desc: "YouTube nâng cao cho iOS" },
      { name: "Instagram Plus", icon: "📷", desc: "Instagram có nhiều tính năng ẩn" },
      { name: "Netflix Premium", icon: "🎬", desc: "Xem Netflix full chất lượng" },
      { name: "Genshin Impact Mod", icon: "⚔️", desc: "Game mod (nếu có)" },
    ];

    function renderApps(filtered) {
      const container = document.getElementById('appList');
      container.innerHTML = '';
      
      filtered.forEach(app => {
        const div = document.createElement('div');
        div.className = "flex items-center gap-4 bg-gray-50 p-4 rounded-3xl active:bg-gray-100";
        div.innerHTML = `
          <div class="w-14 h-14 bg-white shadow rounded-2xl flex items-center justify-center text-4xl flex-shrink-0">
            ${app.icon}
          </div>
          <div class="flex-1 min-w-0">
            <p class="font-semibold text-lg text-black">${app.name}</p>
            <p class="text-sm text-gray-600 line-clamp-1">${app.desc}</p>
          </div>
          <button class="bg-blue-600 text-white px-6 py-2 rounded-3xl text-sm font-medium active:bg-blue-700">
            Tải
          </button>
        `;
        container.appendChild(div);
      });
    }

    // Tìm kiếm
    document.getElementById('search').addEventListener('input', (e) => {
      const term = e.target.value.toLowerCase();
      const filtered = apps.filter(a => a.name.toLowerCase().includes(term));
      renderApps(filtered);
    });

    // Khởi tạo
    renderApps(apps);
  </script>
</body>
</html>
